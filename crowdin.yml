project_id_env: CROWDIN_PROJECT_ID
api_token_env: CROWDIN_PERSONAL_TOKEN

preserve_hierarchy: true

files:
  - source: /crates/core/i18n/en-GB/*.ftl
    translation: /crates/core/i18n/%two_letters_code%/%original_file_name%
  - source: /docs/po/messages.pot
    translation: /docs/po/%two_letters_code%.po
  - source: /website/messages/en.json
    translation: /website/messages/%two_letters_code%.json
