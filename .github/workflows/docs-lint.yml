name: Docs lint

on:
  pull_request:
    paths:
      - "docs/**"
      - ".agents/skills/**"
      - "**/AGENTS.md"
      - "**/REVIEW.md"
      - ".rumdl.toml"
      - ".prettierignore"
      - "thirdparty/**/*-kobo.md"
      - "thirdparty/**/*-cadmus.md"
      - ".github/actions/rumdl-lint/**"
      - ".github/workflows/docs-lint.yml"

jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v7

      - name: Collect markdown files
        id: files
        run: |
          shopt -s globstar nullglob
          all=(docs/**/*.md .agents/skills/**/*.md **/AGENTS.md **/REVIEW.md thirdparty/**/*-kobo.md thirdparty/**/*-cadmus.md)
          files=()
          for f in "${all[@]}"; do
            [[ "$f" == node_modules/* ]] && continue
            files+=("$f")
          done
          echo "list=${files[*]}" >> "$GITHUB_OUTPUT"

      - name: rumdl
        uses: ./.github/actions/rumdl-lint
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          reporter: github-pr-review
          fail_level: error
          filter_mode: added
          rumdl_flags: ${{ steps.files.outputs.list }}
