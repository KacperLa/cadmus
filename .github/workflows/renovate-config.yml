name: Renovate config validation

on:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        id: filter
        with:
          filters: |
            config:
              - 'renovate.json'
              - '.github/workflows/renovate-config.yml'

      - name: Setup Node
        if: steps.filter.outputs.config == 'true'
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          cache: "npm"

      - name: Cache npx
        if: steps.filter.outputs.config == 'true'
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: ~/.npm/_npx
          key: ${{ runner.os }}-npx-renovate

      - name: Validate Renovate config
        if: steps.filter.outputs.config == 'true'
        uses: suzuki-shunsuke/github-action-renovate-config-validator@ee9f69e1f683ed0d08225086482b34fc9abe9300 # v2.1.0
        with:
          config_file_path: renovate.json

      - name: No relevant changes
        if: steps.filter.outputs.config != 'true'
        run: echo "No Renovate config changes — skipping"
