name: Build Kobo
description: >
  Full Kobo build pipeline: restore caches, install dependencies, build
  thirdparty libraries, download static assets, compile Cadmus for ARM,
  create the distribution, and produce release artifacts in release-artifacts/.

  Attestation and artifact upload are left to the caller because they require
  job-level permissions (id-token: write) and differ between workflows.

inputs:
  gh-token:
    description: "GitHub token for downloading assets and authenticating API calls"
    required: true
  gh-oauth-client-id:
    description: "GitHub OAuth client ID for device flow authentication"
    required: true
    default: ""
  test:
    description: "Build the test variant (installs to .adds/cadmus-tst)"
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - name: Cache Linaro toolchain
      id: cache-linaro
      uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
      with:
        path: ~/linaro-toolchain
        key: linaro-gcc-4.9.4-2017.01

    - name: Download Linaro toolchain
      if: steps.cache-linaro.outputs.cache-hit != 'true'
      shell: bash
      run: |
        mkdir -p ~/linaro-toolchain
        cd ~/linaro-toolchain
        wget -q https://developer.arm.com/-/cdn-downloads/permalink/legacy-linaro-gnu-toolchains/4.9-2017.01/gcc-linaro-4.9.4-2017.01-x86_64_arm-linux-gnueabihf.tar.xz
        tar xf gcc-linaro-4.9.4-2017.01-x86_64_arm-linux-gnueabihf.tar.xz --strip-components=1
        rm gcc-linaro-4.9.4-2017.01-x86_64_arm-linux-gnueabihf.tar.xz

    - name: Cache NickelMenu downloads
      uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
      with:
        path: .cache/nickelmenu/
        key: ${{ runner.os }}-nickelmenu-${{ hashFiles('xtask/src/tasks/bundle.rs') }}

    - name: Cache Plato static assets
      uses: ./.github/actions/cache-assets

    - name: Install system packages
      uses: ./.github/actions/apt

    - name: Setup Linaro toolchain
      shell: bash
      run: echo "$HOME/linaro-toolchain/bin" >> "$GITHUB_PATH"

    - name: Download static assets
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.gh-token }}
      run: cargo xtask download-assets

    - name: Setup project
      shell: bash
      run: cargo xtask setup

    - name: Build for Kobo
      shell: bash
      env:
        GH_OAUTH_CLIENT_ID: ${{ inputs.gh-oauth-client-id }}
        PKG_CONFIG_PATH_x86_64_unknown_linux_gnu: ${{ github.workspace }}/target/cadmus-build-deps/x86_64-unknown-linux-gnu/sqlite/lib/pkgconfig
        PKG_CONFIG_PATH_arm_unknown_linux_gnueabihf: ${{ github.workspace }}/target/cadmus-build-deps/arm-unknown-linux-gnueabihf/sqlite/lib/pkgconfig
        PKG_CONFIG_ALLOW_CROSS: 1
      run: |
        if [ "${{ inputs.test }}" = "true" ]; then
          cargo xtask build-kobo --features test
        else
          cargo xtask build-kobo
        fi

    - name: Create distribution
      shell: bash
      run: |
        if [ "${{ inputs.test }}" = "true" ]; then
          cargo xtask dist --test
        else
          cargo xtask dist
        fi

    - name: Build release artifacts
      shell: bash
      run: |
        mkdir -p release-artifacts

        if [ "${{ inputs.test }}" = "true" ]; then
          cd dist
          tar czf ../release-artifacts/cadmus-kobo-test.tar.gz .
          cd ..

          cargo xtask bundle --no-nickel --test
          cp bundle/KoboRoot-test.tgz release-artifacts/KoboRoot-test.tgz

          cargo xtask bundle --test
          cp bundle/KoboRoot-nm-test.tgz release-artifacts/KoboRoot-nm-test.tgz
        else
          cd dist
          tar czf ../release-artifacts/cadmus-kobo.tar.gz .
          cd ..

          cargo xtask bundle --no-nickel
          cp bundle/KoboRoot.tgz release-artifacts/KoboRoot.tgz

          cargo xtask bundle
          cp bundle/KoboRoot-nm.tgz release-artifacts/KoboRoot-nm.tgz
        fi
