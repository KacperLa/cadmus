comment:
  layout: "condensed_header, condensed_files, condensed_footer"
  hide_project_coverage: true

ignore:
  - "thirdparty/**"
  - "mupdf_wrapper/**"
  - "**/build.rs"

coverage:
  status:
    project:
      default:
        informational: true
        threshold: 1%
    patch:
      default:
        informational: true
